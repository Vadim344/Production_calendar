services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: schichtplaner
      POSTGRES_PASSWORD: schichtplaner
      POSTGRES_DB: schichtplaner
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      -  5432:5432
    healthcheck:
      test: [CMD-SHELL, pg_isready -U schichtplaner]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - 6379:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: [CMD, redis-cli, ping]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: server /data --console-address :9001
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - 9000:9000
      - 9001:9001
    healthcheck:
      test: [CMD, mc, ready, local]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  app:
    image: schichtplaner-app:standalone
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://schichtplaner:schichtplaner@postgres:5432/schichtplaner
      REDIS_URL: redis://redis:6379
      S3_ENDPOINT: http://minio:9000
    expose:
      - 3000
    healthcheck:
      test: wget --spider http://127.0.0.1:3000/ || exit 1
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    ports:
      - 80:80
      - 443:443
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
